name: chilenamayorista
region: nyc

# ── API ──────────────────────────────────────────────────────────────────────
services:
  - name: api
    bitbucket:
      repo: siroe/chilenamayorista-api
      branch: main
      deploy_on_push: true
    dockerfile_path: Dockerfile
    http_port: 3001
    instance_size_slug: basic-xxs
    instance_count: 1
    health_check:
      http_path: /api/health
      initial_delay_seconds: 60   # da tiempo a prisma db push en el arranque
    routes:
      - path: /api
        preserve_path_prefix: true
    envs:
      - key: NODE_ENV
        value: production
        scope: RUN_TIME
      - key: PORT
        value: "3001"
        scope: RUN_TIME
      - key: DATABASE_URL
        value: ${db.DATABASE_URL}
        scope: RUN_TIME
      - key: PANEL_ORIGIN
        value: ${APP_URL}
        scope: RUN_TIME
      # ── Reemplazar antes de importar ──────────────────────────────────────
      - key: JWT_SECRET
        value: REEMPLAZAR_SECRET_LARGO
        scope: RUN_TIME
        type: SECRET
      - key: N8N_API_KEY
        value: REEMPLAZAR_GENERAR_NUEVA_KEY
        scope: RUN_TIME
        type: SECRET
      - key: JUMPSELLER_LOGIN
        value: ""
        scope: RUN_TIME
      - key: JUMPSELLER_TOKEN
        value: ""
        scope: RUN_TIME
        type: SECRET
      - key: ANTHROPIC_API_KEY
        value: ""
        scope: RUN_TIME
        type: SECRET

# ── Panel (sitio estático) ────────────────────────────────────────────────────
static_sites:
  - name: panel
    bitbucket:
      repo: siroe/chilenamayorista-front
      branch: main
      deploy_on_push: true
    build_command: npm run build
    output_dir: dist
    catchall_document: index.html   # necesario para React Router
    routes:
      - path: /
    envs:
      - key: VITE_API_URL
        value: ""       # vacío = mismo dominio; DO enruta /api/* → servicio api
        scope: BUILD_TIME

# ── Base de datos gestionada ──────────────────────────────────────────────────
databases:
  - name: db
    engine: PG
    version: "15"
    size: db-s-dev-database   # plan dev ($0). Cambiar a db-s-1vcpu-1gb en prod.
    num_nodes: 1
